[tox]
envlist =
    tests
    linting
    coverage
    type_check
skip_missing_interpreters = True
skipsdist = True

[testenv]
commands = python -m pip install --upgrade pip

[testenv:tests]
# the tests environment is called by the Github action that runs the unit tests
deps =
    -r requirements.txt
    .[tests]
    .[cli]
setenv = PYTHONPATH = {toxinidir}/src
commands = python -m pytest --basetemp={envtmpdir} {posargs}

[testenv:snapshots]
# run: tox -e snapshots  — regenerates all syrupy snapshots
deps =
    -r requirements.txt
    .[tests]
    .[cli]
setenv = PYTHONPATH = {toxinidir}/src
commands = python -m pytest -m snapshot --basetemp={envtmpdir} {posargs} --snapshot-update

[testenv:linting]
# the linting environment is called by the Github Action that runs the linter
deps =
    {[testenv:tests]deps}
    .[linting]
setenv = PYTHONPATH = {toxinidir}/src
commands =
    pylint kuckuck
    pylint unittests --rcfile=unittests/.pylintrc

[testenv:type_check]
# the type_check environment checks the type hints using mypy
setenv = PYTHONPATH = {toxinidir}/src
deps =
    {[testenv:tests]deps}
    .[type_check]
commands =
    mypy --show-error-codes src/kuckuck --strict
    mypy --show-error-codes unittests --strict

[testenv:spell_check]
# the spellcheck environment checks the code for typos.
# Scope is intentionally src/ only: README.md and other prose files contain
# German text, which codespell (English-typo-oriented) cannot handle without
# a ridiculously long ignore list. Code comments and docstrings stay English
# and are the right target here.
setenv = PYTHONPATH = {toxinidir}/src
deps =
    -r requirements.txt
    .[spell_check]
commands =
    codespell --ignore-words=domain-specific-terms.txt src

[testenv:coverage]
# the coverage environment is called by the Github Action that runs the coverage measurement
changedir = unittests
deps =
    {[testenv:tests]deps}
    .[coverage]
setenv = PYTHONPATH = {toxinidir}/src
commands =
    coverage run -m pytest --basetemp={envtmpdir} {posargs}
    coverage html --omit .tox/*,unittests/*
    coverage report --fail-under 80 --omit .tox/*,unittests/*

[testenv:compile_requirements]
deps =
    pip-tools
commands =
    pip-compile pyproject.toml --output-file requirements.txt

[testenv:build_executable]
# Builds a standalone Windows (or Linux) exe via PyInstaller.
# The binary is a thin wrapper around the kuckuck CLI — all runtime
# dependencies (cryptography, phonenumbers, pyahocorasick) are bundled.
#
# Slim build: regex detectors only, no NER. ~50 MB binary.
# For NER-capable binaries, see build_executable_ner / build_executable_macos_ner.
deps =
    -r requirements.txt
    .[cli]
    .[build_executable]
commands =
    pyinstaller --onefile --name kuckuck_windows \
        --collect-data kuckuck \
        src/kuckuck/__main__.py

[testenv:build_executable_macos]
# Builds a standalone macOS binary via PyInstaller with ad-hoc codesign.
#
# macOS Apple Silicon refuses to execute unsigned Mach-O binaries (amfi
# kills them with SIGKILL regardless of Gatekeeper settings). Ad-hoc
# signing ("codesign -s -") is free and sufficient for local use and for
# binaries distributed via GitHub releases after the user clears the
# quarantine xattr:
#     xattr -c kuckuck_macos_arm64
#
# arm64-only — macos-latest runners in GitHub Actions are Apple Silicon.
deps =
    -r requirements.txt
    .[cli]
    .[build_executable]
allowlist_externals =
    codesign
commands =
    pyinstaller --onefile --name kuckuck_macos_arm64 \
        --collect-data kuckuck \
        src/kuckuck/__main__.py
    codesign --force --deep --sign - dist/kuckuck_macos_arm64

[testenv:build_executable_ner]
# Fat NER-capable binary for Windows/Linux.
# Bundles gliner + CPU-only torch + transformers so 'kuckuck fetch-model' and
# 'kuckuck run --ner ...' work without a separate Python install.
#
# CPU-only torch is critical: a default 'pip install torch' pulls ~3 GB of
# CUDA / triton / nvidia libraries that we never use at runtime. The
# +cpu wheels from pytorch.org are ~250 MB and produce a ~600 MB binary.
#
# The model weights themselves are NOT bundled - they live in
# ~/.cache/kuckuck/models after 'kuckuck fetch-model'. Bundling them
# would push the binary past 1 GB without giving users a way to pick a
# different model.
deps =
    -r requirements.txt
    .[cli]
    .[build_executable]
commands_pre =
    # Force CPU-only torch BEFORE installing gliner so the resolver does
    # not pull the GPU build transitively. The CPU wheel ships only the
    # ATen libraries that pyinstaller actually bundles.
    python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
    python -m pip install 'gliner>=0.2.20' 'huggingface-hub>=0.20' 'onnxruntime>=1.18'
commands =
    pyinstaller --onefile --name kuckuck_windows_ner \
        --collect-data kuckuck \
        --collect-all gliner \
        --collect-all huggingface_hub \
        --collect-submodules transformers \
        --collect-data transformers \
        --collect-all tokenizers \
        --collect-data torch \
        --collect-binaries torch \
        --collect-all sentencepiece \
        --collect-all safetensors \
        --copy-metadata torch \
        --copy-metadata gliner \
        --copy-metadata transformers \
        --copy-metadata huggingface_hub \
        --copy-metadata tokenizers \
        --exclude-module nvidia \
        --exclude-module triton \
        --exclude-module cuda \
        --exclude-module tensorflow \
        --exclude-module jax \
        src/kuckuck/__main__.py

[testenv:build_executable_macos_ner]
# Fat NER-capable binary for macOS arm64 with ad-hoc codesign.
# See build_executable_ner for the rationale on CPU-only torch and
# bundling vs. cache layout.
deps =
    -r requirements.txt
    .[cli]
    .[build_executable]
allowlist_externals =
    codesign
commands_pre =
    # On macOS the upstream torch wheels are CPU-only by default (no CUDA
    # on Apple Silicon), but the +cpu wheels still drop a few extras that
    # we never need. The explicit index keeps the install reproducible
    # across PyPI mirrors.
    python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
    python -m pip install 'gliner>=0.2.20' 'huggingface-hub>=0.20' 'onnxruntime>=1.18'
commands =
    pyinstaller --onefile --name kuckuck_macos_arm64_ner \
        --collect-data kuckuck \
        --collect-all gliner \
        --collect-all huggingface_hub \
        --collect-submodules transformers \
        --collect-data transformers \
        --collect-all tokenizers \
        --collect-data torch \
        --collect-binaries torch \
        --collect-all sentencepiece \
        --collect-all safetensors \
        --copy-metadata torch \
        --copy-metadata gliner \
        --copy-metadata transformers \
        --copy-metadata huggingface_hub \
        --copy-metadata tokenizers \
        --exclude-module nvidia \
        --exclude-module triton \
        --exclude-module cuda \
        --exclude-module tensorflow \
        --exclude-module jax \
        src/kuckuck/__main__.py
    codesign --force --deep --sign - dist/kuckuck_macos_arm64_ner

[testenv:dev]
# the dev environment contains everything you need to start developing on your local machine.
deps =
    {[testenv:tests]deps}
    {[testenv:linting]deps}
    {[testenv:type_check]deps}
    {[testenv:coverage]deps}
    {[testenv:spell_check]deps}
    .[formatting]
    .[dev]
commands =
    python -m pip install --upgrade pip
    pip install -r requirements.txt

[testenv:test_packaging]
skip_install = true
deps =
    .[packaging]
commands =
    python -m build
    twine check dist/*
